<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Arena Card Art Viewer</title>
    <link rel="stylesheet" href="/art_view.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎴 MTG Arena Card Art Viewer</h1>
            <div class="subtitle">Browse all available card artworks by set</div>
        </header>

        <div class="controls">
            <input id="searchInput" type="text" placeholder="Search cards (min 3 letters)">
            <button id="clearBtn" style="display:none;">Clear Selection</button>
        </div>

        <div class="sets-section sets-section--collapsed" id="setsSection">
            <div class="sets-header">
                <div class="sets-title">Sets</div>
                <button id="toggleSetsBtn" class="sets-toggle" type="button" aria-expanded="false"
                    aria-controls="setsContainer">
                    Expand
                </button>
            </div>
            <div class="sets-container" id="setsContainer"></div>
        </div>

        <div class="gallery-section">
            <div class="gallery-title">Card Gallery</div>
            <div id="galleryInfo"></div>
            <div class="gallery" id="gallery">
                <div class="empty-state">
                    <div class="empty-state-icon">📷</div>
                    <div class="empty-state-text">Select a set to view cards</div>
                    <div class="empty-state-hint">Click on a set badge to browse its card artworks</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedSet = null;
        let setsMetadata = {};
        let setsList = [];
        let latestSearchToken = 0;
        let setsLoaded = false;

        /**
         * Counts alphabetic letters (A-Z) only.
         */
        function countAlphabeticLetters(value) {
            const matches = String(value || "").match(/[a-z]/gi);
            return matches ? matches.length : 0;
        }

        /**
         * Loads the arena sets from the API.
         */
        async function loadArenaSets() {
            try {
                const response = await fetch("/api/sets");
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const sets = await response.json();
                console.log(`Loaded ${sets.length} sets`);
                return sets;
            } catch (error) {
                console.error("Error loading sets:", error);
                document.getElementById("setsContainer").innerHTML = `
                    <div class="error">
                        <strong>Error loading data:</strong> ${error.message}<br>
                        Please ensure the server is running correctly.
                    </div>
                `;
                return null;
            }
        }

        /**
         * Creates a card tile element.
         */
        function createCardItem(card) {
            const cardItem = card.scryfall_uri
                ? document.createElement("a")
                : document.createElement("div");

            cardItem.className = "card-item";
            cardItem.dataset.cardName = card.name;
            cardItem.title = `${card.name} (${card.rarity})\nClick to view on Scryfall`;

            if (card.scryfall_uri) {
                cardItem.href = card.scryfall_uri;
                cardItem.target = "_blank";
                cardItem.rel = "noopener noreferrer";
            }

            const img = document.createElement("img");
            img.src = card.image_uri;
            img.alt = card.name;
            img.className = "card-image";

            const nameOverlay = document.createElement("div");
            nameOverlay.className = "card-name";
            nameOverlay.textContent = `${card.name}${card.set ? ` (${card.set.toUpperCase()})` : ""}`;

            cardItem.appendChild(img);
            cardItem.appendChild(nameOverlay);

            return cardItem;
        }

        /**
         * Highlights all rendered cards with the same name.
         */
        function highlightMatchingCards(cardName) {
            const gallery = document.getElementById("gallery");
            const cardItems = gallery.querySelectorAll(".card-item");

            for (const item of cardItems) {
                item.classList.toggle("card-item--related", item.dataset.cardName === cardName);
            }
        }

        /**
         * Clears same-name hover highlighting.
         */
        function clearMatchingCardHighlights() {
            const gallery = document.getElementById("gallery");
            const highlightedItems = gallery.querySelectorAll(".card-item--related");

            for (const item of highlightedItems) {
                item.classList.remove("card-item--related");
            }
        }

        /**
         * Handles delegated hover/focus state for card-name highlighting.
         */
        function handleGalleryHighlight(event) {
            const cardItem = event.target.closest(".card-item");
            if (!cardItem) {
                return;
            }

            highlightMatchingCards(cardItem.dataset.cardName);
        }

        /**
         * Renders a standard empty state in the gallery.
         */
        function renderEmptyState(title, hint, icon = "📷") {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">${icon}</div>
                    <div class="empty-state-text">${title}</div>
                    <div class="empty-state-hint">${hint}</div>
                </div>
            `;
        }

        /**
         * Renders a card grid from a card list.
         */
        function renderCards(cards) {
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";

            for (const card of cards) {
                gallery.appendChild(createCardItem(card));
            }
        }

        /**
         * Renders set badges in the sets container.
         */
        function renderSetBadges(sets) {
            const container = document.getElementById("setsContainer");
            container.innerHTML = "";

            if (!sets || sets.length === 0) {
                container.innerHTML = "<div class='error'>No sets data available</div>";
                return;
            }

            for (const set of sets) {
                const badge = document.createElement("div");
                badge.className = "set-badge";
                badge.title = set.name;
                badge.setAttribute("aria-label", `${set.name} (${set.code})`);
                if (selectedSet === set.code) {
                    badge.classList.add("active");
                }

                let iconHtml = "";
                if (set.icon_svg_uri) {
                    const proxyUrl = `/api/set-icon/${set.code}`;
                    iconHtml = `<span class="set-icon-mask" style="mask-image:url('${proxyUrl}');-webkit-mask-image:url('${proxyUrl}')"></span>`;
                }

                badge.innerHTML = `
                    <div class="set-icon">${iconHtml}</div>
                    <div class="set-info">
                        <div class="set-code">${set.code}</div>
                    </div>
                    <div class="set-count">${set.card_count}</div>
                `;

                badge.addEventListener("click", () => selectSet(set.code));
                container.appendChild(badge);
            }
        }

        /**
         * Renders cards for a selected set.
         */
        async function renderGalleryForSet(setCode) {
            const gallery = document.getElementById("gallery");
            const galleryInfo = document.getElementById("galleryInfo");

            gallery.innerHTML = '<div class="loading">Loading cards...</div>';

            try {
                const response = await fetch(`/api/sets/${setCode}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const cards = await response.json();

                const setInfo = setsMetadata[setCode];
                if (setInfo) {
                    galleryInfo.innerHTML = `
                        <div class="gallery-info">
                            <strong>${setInfo.name}</strong> (${setInfo.code}) - ${cards.length} card${cards.length !== 1 ? "s" : ""}
                        </div>
                    `;
                }

                if (cards.length === 0) {
                    renderEmptyState("No cards found", "Try a different set.", "🔍");
                    return;
                }

                renderCards(cards);
            } catch (error) {
                console.error("Error loading cards:", error);
                gallery.innerHTML = `
                    <div class="error" style="grid-column: 1/-1;">
                        Error loading cards: ${error.message}
                    </div>
                `;
            }
        }

        /**
         * Renders server-backed global search results.
         */
        async function renderSearchResults(query) {
            const gallery = document.getElementById("gallery");
            const galleryInfo = document.getElementById("galleryInfo");
            const token = ++latestSearchToken;

            gallery.innerHTML = '<div class="loading">Searching cards...</div>';

            try {
                const response = await fetch(`/api/search/cards?q=${encodeURIComponent(query)}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const payload = await response.json();
                if (token !== latestSearchToken) {
                    return;
                }

                const letters = countAlphabeticLetters(query);
                if (payload.status === "inactive") {
                    galleryInfo.innerHTML = `
                        <div class="gallery-info">
                            Type at least 3 letters to activate search (${letters}/3)
                        </div>
                    `;
                    renderEmptyState("Search inactive", "Keep typing to run fuzzy search.", "🔎");
                    return;
                }

                if (payload.status === "too_many") {
                    galleryInfo.innerHTML = `
                        <div class="gallery-info search-info search-info-warning">
                            ${payload.total_matches} cards matched. Refine your search to 10 or fewer.
                        </div>
                    `;
                    renderEmptyState("Too many matches", "Please type a more specific search term.", "⚠️");
                    return;
                }

                if (payload.status === "no_results") {
                    galleryInfo.innerHTML = `
                        <div class="gallery-info search-info">
                            No results for "${query}".
                        </div>
                    `;
                    renderEmptyState("No cards found", "Try adjusting spelling or using another term.", "🔍");
                    return;
                }

                const cards = Array.isArray(payload.cards) ? payload.cards : [];
                galleryInfo.innerHTML = `
                    <div class="gallery-info search-info search-info-success">
                        Global search: ${payload.total_cards} card${payload.total_cards !== 1 ? "s" : ""}, ${payload.total_arts} art${payload.total_arts !== 1 ? "s" : ""} for "${query}"
                    </div>
                `;

                renderCards(cards);
            } catch (error) {
                if (token !== latestSearchToken) {
                    return;
                }
                console.error("Error searching cards:", error);
                gallery.innerHTML = `
                    <div class="error" style="grid-column: 1/-1;">
                        Error searching cards: ${error.message}
                    </div>
                `;
            }
        }

        /**
         * Handles set selection.
         * Selecting a set clears search filter.
         */
        function selectSet(setCode) {
            const searchInput = document.getElementById("searchInput");
            searchInput.value = "";
            latestSearchToken += 1;

            selectedSet = setCode;
            renderSetBadges(setsList);
            renderGalleryForSet(setCode);
            updateControls();
        }

        /**
         * Clears all filters and returns to neutral state.
         */
        function clearSelection() {
            selectedSet = null;
            latestSearchToken += 1;
            document.getElementById("searchInput").value = "";
            renderSetBadges(setsList);
            renderEmptyState("Select a set to view cards", "Click on a set badge or use search above.");
            document.getElementById("galleryInfo").innerHTML = "";
            updateControls();
        }

        /**
         * Updates control button visibility.
         */
        function updateControls() {
            const clearBtn = document.getElementById("clearBtn");
            const hasSearch = document.getElementById("searchInput").value.trim().length > 0;
            clearBtn.style.display = selectedSet || hasSearch ? "inline-block" : "none";
        }

        /**
         * Handles search input updates.
         * Typing search clears set selection (mutually exclusive filters).
         */
        function onSearchInput() {
            const searchInput = document.getElementById("searchInput");
            const query = searchInput.value;
            const trimmedQuery = query.trim();
            const letterCount = countAlphabeticLetters(query);

            if (trimmedQuery.length > 0 && selectedSet) {
                selectedSet = null;
                renderSetBadges(setsList);
            }

            updateControls();

            if (trimmedQuery.length === 0) {
                latestSearchToken += 1;
                document.getElementById("galleryInfo").innerHTML = "";
                renderEmptyState("Select a set to view cards", "Click on a set badge or use search above.");
                return;
            }

            if (letterCount < 3) {
                latestSearchToken += 1;
                document.getElementById("galleryInfo").innerHTML = `
                    <div class="gallery-info">
                        Type at least 3 letters to activate search (${letterCount}/3)
                    </div>
                `;
                renderEmptyState("Search inactive", "Keep typing to run fuzzy search.", "🔎");
                return;
            }

            renderSearchResults(trimmedQuery);
        }

        /**
         * Debounce helper for input events.
         */
        function debounce(fn, delayMs) {
            let timer = null;
            return function debounced(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delayMs);
            };
        }

        /**
         * Toggles visibility of sets section.
         */
        async function toggleSetsSection() {
            const setsSection = document.getElementById("setsSection");
            const toggleBtn = document.getElementById("toggleSetsBtn");
            const isCollapsed = setsSection.classList.toggle("sets-section--collapsed");

            toggleBtn.textContent = isCollapsed ? "Expand" : "Collapse";
            toggleBtn.setAttribute("aria-expanded", String(!isCollapsed));

            if (!isCollapsed && !setsLoaded) {
                await loadAndRenderSets();
            }
        }

        /**
         * Fetches and renders sets, called lazily on first expand.
         */
        async function loadAndRenderSets() {
            const container = document.getElementById("setsContainer");
            container.innerHTML = '<div class="loading">Loading sets...</div>';
            const sets = await loadArenaSets();
            if (sets) {
                setsList = sets;
                for (const set of sets) {
                    setsMetadata[set.code] = set;
                }
                setsLoaded = true;
                renderSetBadges(sets);
            }
        }

        /**
         * Initializes the application.
         */
        async function init() {
            document.getElementById("clearBtn").addEventListener("click", clearSelection);
            document.getElementById("toggleSetsBtn").addEventListener("click", toggleSetsSection);
            document.getElementById("searchInput").addEventListener("input", debounce(onSearchInput, 250));
            document.getElementById("gallery").addEventListener("mouseover", handleGalleryHighlight);
            document.getElementById("gallery").addEventListener("focusin", handleGalleryHighlight);
            document.getElementById("gallery").addEventListener("mouseleave", clearMatchingCardHighlights);
            document.getElementById("gallery").addEventListener("focusout", clearMatchingCardHighlights);
            updateControls();
        }

        init();
    </script>
</body>

</html>
